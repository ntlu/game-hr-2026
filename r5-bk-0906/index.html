<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>R5 - GIẢI MÃ BÍ ẨN</title>
    <link rel="stylesheet" href="styleR5.css" />
    <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="./node_modules/animate.css/animate.min.css" />
    <script src="./vue-2.6.10.js"></script>
</head>

<body>
    <div id="app">
        <audio class="d-none" loop :src="audioSrc" id="bgm" ref="bgm"></audio>
        <audio class="d-none" :src="sfxSrc" id="sfx" ref="sfx"></audio>
        <video id="bg" autoplay muted loop src="../bg-video-2.mp4"></video>

        <!-- Title -->
        <div id="roundTitleWrapper">
            <div id="roundTitle"></div>
        </div>

        <!-- Main Game View -->
        <div class="game-container">
            <!-- Background Image & Grid -->
            <div class="mystery-image-container"
                :class="{ revealed: showFullImage, 'overflow-visible': animatingPiece }"
                style="background-image: url('static/big-img-2.png');">
                <div class="pieces-grid">
                    <svg viewBox="0 0 1920 1080" preserveAspectRatio="none" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10;">
                        <defs>
                            <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur stdDeviation="6" result="blur" />
                                <feMerge>
                                    <feMergeNode in="blur"/>
                                    <feMergeNode in="SourceGraphic"/>
                                </feMerge>
                            </filter>
                        </defs>
                        <g v-for="(piece, i) in pieces" :key="i"
                           :class="[{ solved: piece.status === 'solved', shaking: i === animatingPieceIndex }]"
                           class="svg-piece-wrapper"
                           :style="{ transformOrigin: svgCenters[i].x + 'px ' + svgCenters[i].y + 'px' }">
                           
                            <path :d="svgPaths[i]" class="svg-piece" :class="{ locked: piece.status === 'locked' }" />
                            
                            <text :x="svgCenters[i].x" :y="svgCenters[i].y" class="svg-piece-text"
                                  v-if="piece.status === 'hidden' && !showFullImage"
                                  alignment-baseline="middle" text-anchor="middle">
                                {{ piece.id }}
                            </text>
                            
                            <!-- Clone for zooming out -->
                            <text v-if="i === animatingPieceIndex" :x="svgCenters[i].x" :y="svgCenters[i].y" class="svg-piece-text-clone"
                                  alignment-baseline="middle" text-anchor="middle">
                                {{ piece.id }}
                            </text>
                        </g>
                    </svg>
                </div>
            </div>

            <!-- Final 30s Timer -->
            <div class="final-timer-wrapper" v-if="showFinalTimer">
                <div id="counterAni">
                    <div id="outer"></div>
                    <div id="inner"></div>
                    <h1 id="counterText" :style="{ color: finalCounterColor }">{{ finalCounterText }}</h1>
                </div>
            </div>
        </div>

        <!-- Question Overlay -->
        <div class="overlay animate__animated animate__fadeIn" v-if="showQuestion && currentPieceIndex !== null"
            style="animation-duration: 0.4s;">
            <div class="q-box animate__animated animate__zoomIn" style="animation-duration: 0.4s;">
                <div class="q-stt" style="font-size: 35px; color: #0ff; margin-bottom: 20px; font-weight: bold;">
                    {{ qDB[currentPieceIndex].stt }}
                </div>
                <div class="q-text">{{ qDB[currentPieceIndex].q }}</div>

                <!-- 15s Timer inside overlay -->
                <div v-show="counterStatus" class="timer-wrapper">
                    <div id="counterAni">
                        <div id="outer"></div>
                        <div id="inner"></div>
                        <h1 id="counterText" :style="{ color: counterColor }">{{ counterText }}</h1>
                    </div>
                </div>

                <!-- Answer -->
                <div class="ans-text animate__animated animate__flipInX" v-if="showAnswer">
                    {{ qDB[currentPieceIndex].ans }}
                </div>
            </div>
        </div>

    </div>

    <script src="./r5.js"></script>
    <script>
        const vm = new Vue({
            el: '#app',
            data: () => ({
                audioSrc: '../bgm_1.mp3',
                sfxSrc: '../end.mp3',
                qDB: qDB, // from r5.js
                pieces: Array.from({ length: 20 }, (_, i) => ({
                    id: i + 1,
                    status: 'hidden' // hidden | locked | solved
                })),
                svgPaths: [
                    'M 0,0 L 384,0 Q 330,120 410,240 Q 200,200 0,270 L 0,0 Z',
                    'M 384,0 L 768,0 Q 810,150 720,310 Q 570,330 410,240 Q 330,120 384,0 Z',
                    'M 768,0 L 1152,0 Q 1100,130 1190,250 Q 950,210 720,310 Q 810,150 768,0 Z',
                    'M 1152,0 L 1536,0 Q 1590,150 1500,300 Q 1350,340 1190,250 Q 1100,130 1152,0 Z',
                    'M 1536,0 L 1920,0 L 1920,270 Q 1700,230 1500,300 Q 1590,150 1536,0 Z',
                    'M 0,270 Q 200,200 410,240 Q 450,410 350,580 Q 180,620 0,540 L 0,270 Z',
                    'M 410,240 Q 570,330 720,310 Q 690,410 800,500 Q 570,480 350,580 Q 450,410 410,240 Z',
                    'M 720,310 Q 950,210 1190,250 Q 1220,420 1110,590 Q 960,610 800,500 Q 690,410 720,310 Z',
                    'M 1190,250 Q 1350,340 1500,300 Q 1470,410 1580,510 Q 1340,490 1110,590 Q 1220,420 1190,250 Z',
                    'M 1500,300 Q 1700,230 1920,270 L 1920,540 Q 1760,580 1580,510 Q 1470,410 1500,300 Z',
                    'M 0,540 Q 180,620 350,580 Q 310,690 400,800 Q 190,750 0,810 L 0,540 Z',
                    'M 350,580 Q 570,480 800,500 Q 830,670 740,850 Q 580,880 400,800 Q 310,690 350,580 Z',
                    'M 800,500 Q 960,610 1110,590 Q 1080,680 1180,770 Q 950,740 740,850 Q 830,670 800,500 Z',
                    'M 1110,590 Q 1340,490 1580,510 Q 1620,680 1520,840 Q 1360,860 1180,770 Q 1080,680 1110,590 Z',
                    'M 1580,510 Q 1760,580 1920,540 L 1920,810 Q 1710,760 1520,840 Q 1620,680 1580,510 Z',
                    'M 0,810 Q 190,750 400,800 Q 460,940 384,1080 L 0,1080 L 0,810 Z',
                    'M 400,800 Q 580,880 740,850 Q 680,960 768,1080 L 384,1080 Q 460,940 400,800 Z',
                    'M 740,850 Q 950,740 1180,770 Q 1230,930 1152,1080 L 768,1080 Q 680,960 740,850 Z',
                    'M 1180,770 Q 1360,860 1520,840 Q 1460,960 1536,1080 L 1152,1080 Q 1230,930 1180,770 Z',
                    'M 1520,840 Q 1710,760 1920,810 L 1920,1080 L 1536,1080 Q 1460,960 1520,840 Z'
                ],
                svgCenters: [
                    { x: 198, y: 127 },
                    { x: 570, y: 137 },
                    { x: 957, y: 140 },
                    { x: 1344, y: 137 },
                    { x: 1719, y: 142 },
                    { x: 190, y: 407 },
                    { x: 570, y: 407 },
                    { x: 955, y: 412 },
                    { x: 1345, y: 412 },
                    { x: 1730, y: 405 },
                    { x: 187, y: 682 },
                    { x: 572, y: 682 },
                    { x: 957, y: 677 },
                    { x: 1347, y: 677 },
                    { x: 1735, y: 675 },
                    { x: 196, y: 942 },
                    { x: 573, y: 952 },
                    { x: 960, y: 945 },
                    { x: 1347, y: 942 },
                    { x: 1724, y: 952 }
                ],
                currentPieceIndex: null,
                showQuestion: false,
                showAnswer: false,

                // Piece Timer
                counterTime: 0,
                counterStatus: false,
                counterText: '15',
                counterColor: 'lime',
                intervalId: null,

                // Final Timer
                showFinalTimer: false,
                finalCounterTime: 0,
                finalCounterText: '30',
                finalCounterColor: 'lime',
                finalIntervalId: null,

                showFullImage: false,
                animatingPiece: false,
                animatingPieceIndex: null
            }),
            methods: {
                playBGM(fileName) {
                    this.audioSrc = fileName;
                    this.$refs['bgm'].src = this.audioSrc;
                    this.$refs['bgm'].play();
                },
                playSFX(fileName) {
                    this.sfxSrc = fileName;
                    this.$refs['sfx'].src = this.sfxSrc;
                    this.$refs['sfx'].play();
                },
                stopBGM() {
                    this.$refs['bgm'].pause();
                    this.$refs['bgm'].currentTime = 0;
                },

                startPieceTimer(seconds) {
                    if (this.intervalId !== null) {
                        clearInterval(this.intervalId);
                    }
                    this.counterStatus = true;
                    this.playBGM(this.audioSrc);
                    this.counterTime = seconds;
                    this.updateCounterDisplay();

                    this.intervalId = setInterval(() => {
                        this.counterTime--;
                        if (this.counterTime <= 0) {
                            clearInterval(this.intervalId);
                            this.intervalId = null;
                            this.stopBGM();
                            this.playSFX('../end.mp3');
                            this.counterStatus = false;
                            this.updateCounterDisplay();
                        } else {
                            this.updateCounterDisplay();
                        }
                    }, 1000);
                },
                updateCounterDisplay() {
                    if (this.counterTime <= 10) {
                        this.counterColor = 'red';
                    } else {
                        this.counterColor = 'lime';
                    }
                    let displaySecs = this.counterTime;
                    if (displaySecs < 10 && displaySecs > 0) displaySecs = '0' + displaySecs;
                    this.counterText = displaySecs.toString();
                },

                startFinalTimer(seconds) {
                    if (this.finalIntervalId !== null) {
                        clearInterval(this.finalIntervalId);
                    }
                    this.showFinalTimer = true;
                    this.playBGM(this.audioSrc);
                    this.finalCounterTime = seconds;
                    this.updateFinalCounterDisplay();

                    this.finalIntervalId = setInterval(() => {
                        this.finalCounterTime--;
                        if (this.finalCounterTime <= 0) {
                            clearInterval(this.finalIntervalId);
                            this.finalIntervalId = null;
                            this.stopBGM();
                            this.playSFX('../end.mp3');
                            this.showFinalTimer = false;
                            this.updateFinalCounterDisplay();
                        } else {
                            this.updateFinalCounterDisplay();
                        }
                    }, 1000);
                },
                updateFinalCounterDisplay() {
                    if (this.finalCounterTime <= 10) {
                        this.finalCounterColor = 'red';
                    } else {
                        this.finalCounterColor = 'lime';
                    }
                    let displaySecs = this.finalCounterTime;
                    if (displaySecs < 10 && displaySecs > 0) displaySecs = '0' + displaySecs;
                    this.finalCounterText = displaySecs.toString();
                }
            },
            created() {
                const _this = this;
                const channel = new BroadcastChannel('myChannelR5');
                channel.addEventListener('message', (event) => {
                    console.log(event.data);
                    let _cmd = event.data.message.cmd;
                    let _data = event.data.message.data;

                    if (_cmd === 'openQuestion') {
                        _this.currentPieceIndex = _data;
                        _this.animatingPieceIndex = _data;
                        _this.animatingPiece = true;
                        _this.showQuestion = false;
                        _this.showAnswer = false;
                        _this.counterStatus = false;

                        // Show question midway through the zoom
                        // Shake is 0.8s, Zoom is 2s (Total 2.8s)
                        setTimeout(() => {
                            if (_this.animatingPiece) {
                                _this.showQuestion = true;
                            }
                        }, 1800);

                        // Reset animation state when done
                        setTimeout(() => {
                            if (_this.animatingPiece) {
                                _this.animatingPiece = false;
                                _this.animatingPieceIndex = null;
                            }
                        }, 1850);
                    }
                    else if (_cmd === 'startTimer') {
                        _this.startPieceTimer(_data);
                    }
                    else if (_cmd === 'showAnswer') {
                        _this.showAnswer = true;
                    }
                    else if (_cmd === 'markCorrect') {
                        if (_this.currentPieceIndex !== null) {
                            _this.pieces[_this.currentPieceIndex].status = 'solved';
                            _this.playSFX('../correct.mp3'); // Example sfx
                        }
                        _this.showQuestion = false;
                        if (_this.intervalId) clearInterval(_this.intervalId);
                        _this.stopBGM();
                    }
                    else if (_cmd === 'markIncorrect') {
                        if (_this.currentPieceIndex !== null) {
                            _this.pieces[_this.currentPieceIndex].status = 'locked';
                            _this.playSFX('../sai.mp3');
                        }
                        _this.showQuestion = false;
                        if (_this.intervalId) clearInterval(_this.intervalId);
                        _this.stopBGM();
                    }
                    else if (_cmd === 'closeQuestion') {
                        _this.animatingPiece = false;
                        _this.animatingPieceIndex = null;
                        _this.showQuestion = false;
                        if (_this.intervalId) clearInterval(_this.intervalId);
                        _this.stopBGM();
                    }
                    else if (_cmd === 'startFinalTimer') {
                        _this.startFinalTimer(_data);
                    }
                    else if (_cmd === 'revealImage') {
                        _this.showFullImage = true;
                        _this.showFinalTimer = false;
                    }
                    else if (_cmd === 'hideImage') {
                        _this.showFullImage = false;
                    }
                    else if (_cmd === 'resetGame') {
                        _this.pieces.forEach(p => p.status = 'hidden');
                        _this.currentPieceIndex = null;
                        _this.animatingPiece = false;
                        _this.animatingPieceIndex = null;
                        _this.showQuestion = false;
                        _this.showAnswer = false;
                        _this.showFullImage = false;
                        _this.showFinalTimer = false;
                        _this.counterStatus = false;

                        if (_this.intervalId) {
                            clearInterval(_this.intervalId);
                            _this.intervalId = null;
                        }
                        if (_this.finalIntervalId) {
                            clearInterval(_this.finalIntervalId);
                            _this.finalIntervalId = null;
                        }
                        _this.stopBGM();
                    }
                });
            }
        });
    </script>
</body>

</html>
