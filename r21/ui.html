<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.min.css" />
  <script src="./vue-2.6.10.js"></script>
  <title>UI R21</title>
</head>

<body>
  <div id="app" class="container">
    <div class="row">
      <div class="col-12" style="display: flex; margin-bottom: 15px;">
        <input style="width: 100px;" type="number" class="form-control" v-model.number="second" />
        <button @click="sendCmd({cmd: 'startCountdownR21',data: second})" class="btn btn-primary">
          Thời gian [{{second}}]
        </button>
      </div> <br>
      <div v-for="index in 36" :key="index" class="col-2">
        <button @click="sendCmd({cmd: 'showMiniQuestionR21',data: index - 1})" class="btn btn-primary mb-3">Câu {{ index
          }}</button>
      </div>

      <div class="col-2">
        <button @click="sendCmd({cmd: 'showAnswerR21',data: null})" class="btn btn-warning">1. Trả lời</button>
      </div>
      <div class="col-2">
        <button @click="sendCmd({cmd: 'checkAnswerTrueR21',data: null})" class="btn btn-success">2. Đúng</button>
      </div>
      <div class="col-2">
        <button @click="sendCmd({cmd: 'checkAnswerWrongR21',data: null})" class="btn btn-danger">3. Sai</button>
      </div>

      <div class="col-3">
        <button @click="sendCmd({cmd: 'offMiniQuestion1R21',data: 0})" class="btn text-white"
          style="background-color: purple;">4. Tắt câu hỏi CÓ đổi
          màu</button>
      </div>
      <div class="col-3">
        <button @click="sendCmd({cmd: 'offMiniQuestionR21',data: null})" class="btn" style="background-color: pink;">5.
          Tắt câu hỏi KHÔNG
          đổi màu</button>
      </div>
    </div>
  </div>
  <script>
    var vm = new Vue({
      el: '#app',
      data: {
        second: 180,
      },
      methods: {
        sendCmd(cmd) {
          const channel = new BroadcastChannel('myChannel'); // Create a new broadcast channel
          channel.postMessage({ message: cmd }); // Send the message
          console.log(cmd);
        },
      },
    });
  </script>
</body>

</html>
