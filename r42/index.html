<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>R22</title>
  <link rel="stylesheet" href="styleR22.css" />
  <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="./node_modules/animate.css/animate.min.css" />
  <script src="./vue-2.6.10.js"></script>
</head>

<body>
  <div id="app">
    <audio class="d-none" loop :src="audioSrc" id="audio" ref="bgm"></audio>
    <audio class="d-none" :src="sfxSrc" id="audio" ref="sfx"></audio>
    <div class="container-fluid">
      <video id="bg" autoplay muted loop src="../bg-video-2.mp4"></video>
      <div class="row">
        <div class="col-12 questionWrapper animate__animated animate__fadeIn">
          <div id="questionHolder">
            <div v-if="!answerStatus">
              <div v-show="counterStatus" id="counterAni" class="animate__animated animate__rollIn">
                <div id="outer"></div>
                <div id="inner"></div>
                <h1 id="counterText" :style="{ color: counterColor, fontSize: counterFontSize }" ref="counterText"
                  v-html="counterText"></h1>
              </div>
            </div>
            <!-- <div v-if="answerStatus">
                <span class="showCorrectAnswer animate__animated animate__zoomInDown">{{questionDB[currentQIndex].r}}</span>
              </div> -->

            <div v-if="answerStatus">
              <div class="row">
                <div class="col-6 col6-ans" style="margin-top: 15%; padding-left: 66px">
                  <div v-for="(item, index) in questionDB[currentQIndex].r.slice(0, 5)" :key="index"
                    class="mt-3 showCorrectAnswer animate__animated animate__zoomInDown">
                    {{ item }}
                  </div>
                </div>
                <div class="col-6 col6-ans" style="margin-top: 15%; padding-right: 66px">
                  <div v-for="(item, index) in questionDB[currentQIndex].r.slice(5, 10)" :key="index"
                    class=" mt-3 showCorrectAnswer animate__animated animate__zoomInDown">
                    {{ item }}
                  </div>
                </div>
              </div>
            </div>

          </div>

        </div>
      </div>
    </div>
  </div>
</body>
<!-- <script src="./r22.js"></script> -->
<script src="./r22_demo.js"></script>
<script>

  const vm = new Vue({
    el: '#app',
    data: () => ({
      tickerInterval: null,
      counterText: '00:00',
      counterColor: 'lime',
      counterFontSize: '100px',
      counterTime: 0,
      // audioSrc: '../bgm_1.mp3',
      audioSrc: '../nhac-game.mp3',
      sfxSrc: '../end.mp3',
      questionDB: qDB,
      currentQIndex: 0,
      answerStatus: false,
      counterStatus: false,

      intervalId: null,
    }),
    methods: {
      nextQuestion() {
        // this.currentQIndex++;
        this.answerStatus = false;
        (this.counterText = '00:00'),
          (this.counterTime = 0),
          document.querySelectorAll('.ansPanel').forEach((el) => el.classList.remove('correct'));
      },

      showCorrectAnswer() {
        this.setCorrectAns(this.questionDB[this.currentQIndex].r);
      },
      setCorrectAns(tg) {
        // tg as : A | B | C | D
        document.querySelectorAll('.ansPanel').forEach((el) => el.classList.remove('correct'));
        let _tg = `ans_${tg}`;
        //this.$refs[_tg].classList.add('correct', 'animate__rubberBand');
        setTimeout(() => {
          //this.$refs[_tg].classList.remove('animate__rubberBand');
        }, 1000);
      },
      playBGM(fileName) {
        this.audioSrc = fileName;
        this.$refs['bgm'].src = this.audioSrc;
        this.$refs['bgm'].play();
      },
      playSFX(fileName) {
        this.sfxSrc = fileName;
        this.$refs['sfx'].src = this.sfxSrc;
        this.$refs['sfx'].play();
      },
      stopBGM() {
        this.$refs['bgm'].pause();
        this.$refs['bgm'].currentTime = 0;
      },
      startCounting(seconds) {
        // Ngừng setInterval cũ (nếu có)
        if (this.intervalId !== null) {
          clearInterval(this.intervalId);
          this.intervalId = null;
        }

        this.counterStatus = true;
        this.playBGM(this.audioSrc);
        this.counterTime = seconds;

        // Cập nhật hiển thị ban đầu
        this.updateCounterDisplay();

        // Bắt đầu lần đếm mới
        this.intervalId = setInterval(() => {
          this.counterTime--;

          if (this.counterTime <= 0) {
            // Ngừng và đặt lại biến intervalId
            clearInterval(this.intervalId);
            this.intervalId = null;
            this.counterStatus = false;
            this.stopBGM();
            this.playSFX('../end.mp3');
          } else {
            this.updateCounterDisplay();
          }
        }, 1000);
      },
      updateCounterDisplay() {
        if (this.counterTime > 60) {
          this.counterFontSize = '23px';
          this.counterColor = 'lime';

          // Tính toán phút và giây còn lại
          const minutes = Math.floor(this.counterTime / 60);
          let remainingSeconds = this.counterTime % 60;
          if (remainingSeconds < 10) {
            remainingSeconds = `0${remainingSeconds}`;
          }
          this.counterText = `${minutes}:${remainingSeconds}`;
        } else {
          this.counterFontSize = '38px';
          if (this.counterTime < 10) {
            this.counterColor = 'red';
          }
          this.counterText = `${this.counterTime}`;
        }
      },
      receiveMessage(event) {
        console.log(event.data);
      },
    },

    created() {
      let _this = this;
      const channel = new BroadcastChannel('myChannel'); // Create a new broadcast channel
      channel.addEventListener('message', (event) => {
        console.log(event.data);
        let _cmd = event.data.message.cmd;
        let _data = event.data.message.data;

        if (_cmd === 'startCountingR22') {
          _this.startCounting(_data);
        }
        if (_cmd === 'nextQuestionR22') {
          _this.nextQuestion();
        }
        if (_cmd === 'showCorrectAnswerR22' && _data.startsWith('correct')) {
          let correctIndex = parseInt(_data.replace('correct', '')) - 1;
          if (!isNaN(correctIndex)) {
            _this.currentQIndex = correctIndex;
            _this.showCorrectAnswer();
            _this.answerStatus = true;
          }
        }

      });
    },
  });
</script>

</html>

<style>
  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
  }

  video#bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
    filter: blur(7px);
  }

  .questionWrapper {
    position: relative;
  }

  #questionHolder {
    background-image: url(../doanydongdoi.png);
    background-size: contain;
    top: -20px;
    width: 100vw;
    height: 100vh;
    background-repeat: no-repeat;
    background-position: center center;
    margin: 19px -12px;
    position: relative;
  }

  #questionHolder h1 {
    text-align: center;
    position: absolute;
    width: 100%;
    top: 2%;
    color: yellow;
  }

  #questionHolder h2 {
    text-align: center;
    position: absolute;
    width: 100%;
    top: 10%;
    color: yellow;
  }

  #questionHolder span {
    display: flex;
    align-items: center;
    text-align: center;
    position: absolute;
    width: 85%;
    height: 515px;
    top: 20%;
    left: 8%;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 1px 1px #333;
    padding: 15px;
  }

  .showCorrectAnswer {
    padding: 12px;
    text-align: center;
    font-size: 35px !important;
    font-weight: bold;
    color: rgb(0, 0, 0) !important;
    background-image: linear-gradient(to right, #d7f9ff, #e0d6fe);
    background-repeat: no-repeat;
    background-size: 100% 200%;
    border-radius: 20px;
    box-shadow: 0px 0 50px 10px #0fceff;
  }

  div#counterAni {
    width: 240px;
    height: 240px;
    background: radial-gradient(#0dcaf06b, #681bff);
    position: absolute;
    top: 38%;
    left: 38%;
    border-radius: 100%;
    text-align: center;
  }

  div#outer {

    background: url(../outer_counter.png);
    width: 200%;
    height: 200%;
    top: -50% !important;
    left: -50% !important;
    background-size: contain;
    position: absolute;
    background-repeat: no-repeat;
    animation: rotateClockwise 10s ease-in-out infinite;
  }

  div#inner {
    background: url(../inner_counter.png);
    width: 200%;
    height: 200%;
    top: -50% !important;
    left: -50% !important;
    background-size: contain;
    position: absolute;
    background-repeat: no-repeat;
    animation: counterClockwise 5s ease-in-out infinite;
  }

  @keyframes rotateClockwise {
    0% {
      transform: rotate(0deg);
    }

    100% {
      transform: rotate(360deg);
    }
  }

  @keyframes counterClockwise {
    0% {
      transform: rotate(360deg);
    }

    50% {
      transform: rotate(0deg);
    }

    100% {
      transform: rotate(360deg);
    }
  }

  #counterText {
    margin-top: 50px;
    line-height: 140px;
    color: lime;
    font-size: 90px !important;
    text-shadow: 1px 5px 3px #333;
  }

  .ansPanel {
    background: url(../normal.png) no-repeat;
    background-size: contain;
    width: 50vw;
    height: 167px;
    margin: -30px 0 0 0;
    display: flex;
    position: relative;
    flex-direction: row;
    flex-wrap: nowrap;
    align-content: center;
    justify-content: center;
    align-items: center;
  }

  .ansPanel.correct {
    background-image: url(../correct.png);
  }

  .innerText {
    position: relative;
    width: 70%;
    text-align: center;
    font-weight: bold;
    font-size: 20px;
    margin: 0 auto;
  }
</style>
