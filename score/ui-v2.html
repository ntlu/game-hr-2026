<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UI Score</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="./node_modules/animate.css/animate.min.css" />
    <script src="./vue-2.6.10.js"></script>
  </head>

  <body>
    <div id="app">
      <div class="container-fluid">
        <video id="bg" style="filter: blur(5px)" autoplay muted loop src="../bg-video-2.mp4"></video>
        <div style="display: flex; justify-content: space-between">
          <button @click="sendCmd({cmd: 'showTbl',data: items})" class="btn btn-primary">ShowTbl</button>

          <button @click="sendCmd({cmd: 'showScore',data: items})" class="btn btn-primary">showScore</button>

          <button @click="sendCmd({cmd: 'sort',data: items})" class="btn btn-primary">Sort</button>
          <button @click="sendCmd({cmd: 'delete',data: items})" class="btn btn-primary">Delete Team Out</button>
          <button @click="sendCmd({cmd: 'reset',data: items})" class="btn btn-primary">Reset</button>

          <!-- <button @click="resetItems">Reset</button> -->
        </div>
        <div class="rowName">
          <h3 style="margin-bottom: 0px; margin-left: 333px; margin-right: 82px">Vượt Chướng Ngại Vật:</h3>
          <h3 style="margin-bottom: 0px">Hợp lực:</h3>
          <h3 style="margin-bottom: 0px; margin-left: 66px; margin-right: 80px">Đoán ý đồng đội:</h3>
          <h3 style="margin-bottom: 0px">Tổng:</h3>
        </div>
        <ul>
          <transition-group name="list">
            <li
              v-for="item in items"
              :key="item.id"
              :style="{ backgroundColor: item.isGray ? 'gray' : 'transparent' }"
              style="width: 92vw"
            >
              <span class="teamName">{{ 'Đội ' + item.id + ': ' + item.name }}</span>
              <div>
                <input @input="calculateTotalScore" class="inputScore" v-model="item.r1" placeholder="Enter r1" />
                <input
                  @input="calculateTotalScore"
                  class="inputScore"
                  style="margin-left: 55px; margin-right: 55px"
                  v-model="item.r21"
                  placeholder="Enter r21"
                />
                <input
                  @input="calculateTotalScore"
                  class="inputScore"
                  style="text-align: center"
                  v-model="item.r22"
                  placeholder="Enter r22"
                />
                <input
                  @input="calculateTotalScore"
                  class="inputScore"
                  style="margin-left: 55px"
                  v-model="item.totalScore"
                />
              </div>
            </li>
          </transition-group>
        </ul>
      </div>
    </div>
  </body>

  <script>
    const initialItems = [
    // { id: 1, name: 'E1 + POTH', r1: 0, r21: 0, r22: 0, totalScore: 0, isGray: false },
    // { id: 2, name: 'E6 + BMM + QC', r1: 0, r21: 0, r22: 0, totalScore: 0, isGray: false },
    // { id: 3, name: 'DI', r1: 0, r21: 0, r22: 0, totalScore: 0, isGray: false },
    // { id: 4, name: 'F2 + SC', r1: 0, r21: 0, r22: 0, totalScore: 0, isGray: false },
    // { id: 5, name: 'F3', r1: 0, r21: 0, r22: 0, totalScore: 0, isGray: false },
    // { id: 6, name: 'VPL', r1: 0, r21: 0, r22: 0, totalScore: 0, isGray: false },
    { id: 1, name: 'PCC', r1: 0, r21: 0, r22: 0, totalScore: 0, isGray: false },
    { id: 2, name: 'QC', r1: 0, r21: 0, r22: 0, totalScore: 0, isGray: false },
    { id: 3, name: 'VPL', r1: 0, r21: 0, r22: 0, totalScore: 0, isGray: false },
    { id: 4, name: 'F3', r1: 0, r21: 0, r22: 0, totalScore: 0, isGray: false },
    { id: 5, name: 'DI', r1: 0, r21: 0, r22: 0, totalScore: 0, isGray: false },
    { id: 6, name: 'E3', r1: 0, r21: 0, r22: 0, totalScore: 0, isGray: false },
  ];

    const vm = new Vue({
      el: '#app',
      data: () => ({
        items: [...initialItems], // Sao chép mảng ban đầu vào biến items
        sorting: false,
      }),
      methods: {
        calculateTotalScore() {
          for (let i = 0; i < this.items.length; i++) {
            const item = this.items[i];
            item.totalScore = parseFloat(item.r1) + parseFloat(item.r21) + parseFloat(item.r22);
          }
        },
        sendCmd(cmd) {
          const channel = new BroadcastChannel('myChannel'); // Create a new broadcast channel
          channel.postMessage({ message: cmd }); // Send the message
          console.log(cmd);
        },

        sortItems() {
          this.sorting = true;
          this.items.sort((a, b) => b.totalScore - a.totalScore);
          this.sorting = false;

          // Lấy 6 đội có totalScore thấp nhất
          const lowestScoreTeams = this.items.slice(3);

          // Đánh dấu các đội này với màu xám
          for (const team of lowestScoreTeams) {
            team.isGray = true;
          }
        },

        resetItems() {
          // Khôi phục lại mảng items ban đầu
          this.items = [...initialItems];
          for (const team of this.items) {
            team.isGray = false;
          }
        },
      },
      created() {},
      watch: {
        sorting(newVal) {
          if (!newVal) {
            this.calculateTotalScore();
          }
        },
      },
      computed: {
        calculateTotalScore() {
          for (let i = 0; i < this.items.length; i++) {
            const item = this.items[i];
            item.totalScore = parseFloat(item.r1) + parseFloat(item.r21) + parseFloat(item.r22);
          }
        },
      },
    });
  </script>
</html>
<style>
  #app {
    font-family: arial;
  }
  .rowName {
    color: white;
    display: flex;
    width: 95vw;
  }
  ul {
    display: flex;
    justify-content: center;
    list-style: none;
    margin: 0;
    padding: 0;
    background: #d1f8ec;
  }

  .teamName {
    width: 300px;
    font-size: 25px;
  }
  .inputScore {
    border: none;
    font-size: 22px;
    text-align: center;
    width: 100px;
    height: 30px;
    box-shadow: 2px 2px 10px 0.5px #de6d6d;
  }

  li {
    border: 1px solid rgb(108, 108, 108);
    padding: 5px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
  }

  input {
    margin-left: 10px;
  }

  .list-enter-active {
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.5s ease-in-out;
  }

  .list-enter-to {
    opacity: 1;
    transform: translateY(0);
  }
</style>
