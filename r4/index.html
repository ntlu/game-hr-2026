<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>R4</title>
  <link rel="stylesheet" href="styleR42.css" />
  <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="./node_modules/animate.css/animate.min.css" />
  <script src="./vue-2.6.10.js"></script>
</head>

<body>
  <div id="app">
    <audio class="d-none" loop :src="audioSrc" id="audio" ref="bgm"></audio>
    <audio class="d-none" :src="sfxSrc" id="audio" ref="sfx"></audio>
    <div class="container-fluid">
      <video id="bg" autoplay muted loop src="../bg-video-2.mp4"></video>
      <div class="row">
        <div class="col-12 questionWrapper">
          <div id="roundTitleWrapper" :class="{ 'shrunk': showTable || answerStatus || showAllAnswer }">
            <div id="roundTitle"></div>
          </div>
          <div id="questionHolder">
            <template v-if="showTable && !answerStatus && !showAllAnswer">
              <div v-for="(questionRow, rowIndex) in groupedQuestions" :key="'table-' + rowIndex" class="row" :style="{
                  paddingTop: rowIndex === 0 ? '12%' : '1%',
                  paddingLeft: '5%',
                  paddingRight: '5%'
                }">
                <div class="col-6" v-for="(question, index) in questionRow" :key="index"
                  style="padding-left: 6px; padding-right: 6px;">
                  <div class="showTable" :style="getStyle(index + rowIndex * 2)">
                    <div>
                      {{ question.r }}
                    </div>
                  </div>
                </div>
              </div>
            </template>

            <div v-if="!answerStatus && !showAllAnswer">
              <div v-show="counterStatus" id="counterAni">
                <div id="outer"></div>
                <div id="inner"></div>
                <h1 id="counterText" :style="{ color: counterColor, fontSize: counterFontSize }" ref="counterText"
                  v-html="counterText"></h1>
              </div>
            </div>

            <div v-if="answerStatus && !showAllAnswer" class="row">
              <div class="col-12 card-ans" style="padding: 14% 6%">
                <div class="showCorrectAnswer">
                  <div class="center-content">
                    <div style="font-size: 50px; padding:8px;">
                      {{ questionDB[currentQIndex].r }}
                    </div>
                    <div>
                      <img v-for="(imgSrc, imgIndex) in questionDB[currentQIndex].img" :key="imgIndex" :src="imgSrc"
                        alt="image" class="img-fade" style="width: 207px; height: 178px; margin: 8px;" />
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <template v-if="showAllAnswer">
              <div v-for="(questionRow, rowIndex) in groupedQuestions" :key="'all-' + rowIndex" class="row" :style="{
                  paddingTop: rowIndex === 0 ? '12%' : '1%',
                  paddingLeft: '5%',
                  paddingRight: '5%'
                }">
                <div class="col-6" v-for="(question, index) in questionRow" :key="index"
                  style="padding-left: 0px; padding-right: 6px;">
                  <div class="showCorrectAnswer" :style="getStyle(index + rowIndex * 2)">
                    <div>
                      {{ question.r }}
                    </div>
                    <div>
                      <img v-for="(imgSrc, imgIndex) in question.img" :key="imgIndex" :src="imgSrc" alt="image"
                        class="img-fade" style="width: 105px; height: 91px; margin: 5px;" />
                    </div>
                  </div>
                </div>
              </div>
            </template>

          </div>
        </div>
      </div>
    </div>
  </div>
</body>
<script src="./r4.js"></script>
<script>

  const vm = new Vue({
    el: '#app',
    data: () => ({
      tickerInterval: null,
      counterText: '00:00',
      counterColor: 'lime',
      counterFontSize: '100px',
      counterTime: 0,
      // audioSrc: '../bgm_1.mp3',
      audioSrc: '../nhac-game.mp3',
      sfxSrc: '../end.mp3',
      questionDB: qDB,
      currentQIndex: null,
      answerStatus: false,
      showAllAnswer: false,
      counterStatus: false,
      showTable: false,

      intervalId: null,
    }),
    methods: {

      getStyle(index) {
        return {
          height: index < 2 ? '280px' : '300px'
        };
      },

      setCorrectAns(tg) {
        // tg as : A | B | C | D
        document.querySelectorAll('.ansPanel').forEach((el) => el.classList.remove('correct'));
        let _tg = `ans_${tg}`;
        //this.$refs[_tg].classList.add('correct', 'animate__rubberBand');
        setTimeout(() => {
          //this.$refs[_tg].classList.remove('animate__rubberBand');
        }, 1000);
      },
      playBGM(fileName) {
        this.audioSrc = fileName;
        this.$refs['bgm'].src = this.audioSrc;
        this.$refs['bgm'].play();
      },
      playSFX(fileName) {
        this.sfxSrc = fileName;
        this.$refs['sfx'].src = this.sfxSrc;
        this.$refs['sfx'].play();
      },
      stopBGM() {
        this.$refs['bgm'].pause();
        this.$refs['bgm'].currentTime = 0;
      },
      startCounting(seconds) {
        // Ngừng setInterval cũ (nếu có)
        if (this.intervalId !== null) {
          clearInterval(this.intervalId);
          this.intervalId = null;
        }

        this.counterStatus = true;
        this.playBGM(this.audioSrc);
        this.counterTime = seconds;

        // Cập nhật hiển thị ban đầu
        this.updateCounterDisplay();

        // Bắt đầu lần đếm mới
        this.intervalId = setInterval(() => {
          this.counterTime--;

          if (this.counterTime <= 0) {
            // Ngừng và đặt lại biến intervalId
            clearInterval(this.intervalId);
            this.intervalId = null;
            this.counterStatus = false;
            this.stopBGM();
            this.playSFX('../end.mp3');
          } else {
            this.updateCounterDisplay();
          }
        }, 1000);
      },
      updateCounterDisplay() {
        if (this.counterTime > 60) {
          this.counterFontSize = '23px';
          this.counterColor = 'lime';

          // Tính toán phút và giây còn lại
          const minutes = Math.floor(this.counterTime / 60);
          let remainingSeconds = this.counterTime % 60;
          if (remainingSeconds < 10) {
            remainingSeconds = `0${remainingSeconds}`;
          }
          this.counterText = `${minutes}:${remainingSeconds}`;
        } else {
          this.counterFontSize = '38px';
          if (this.counterTime < 10) {
            this.counterColor = 'red';
          }
          this.counterText = `${this.counterTime}`;
        }
      },
      receiveMessage(event) {
        console.log(event.data);
      },
    },

    created() {
      let _this = this;
      const channel = new BroadcastChannel('myChannel'); // Create a new broadcast channel
      channel.addEventListener('message', (event) => {
        console.log(event.data);
        let _cmd = event.data.message.cmd;
        let _data = event.data.message.data;

        if (_cmd === 'startCountingR42') {
          _this.startCounting(_data);
        }
        // if (_cmd === 'showCorrectAnswerR42') {
        //   _this.answerStatus = !_this.answerStatus;
        // }
        if (_cmd === 'showCorrectAnswerR42' && _data === 0) {
          _this.answerStatus = true;
          _this.currentQIndex = 0;
          console.log(_this.currentQIndex);
        }
        if (_cmd === 'showCorrectAnswerR42' && _data === 1) {
          _this.answerStatus = true;
          _this.currentQIndex = 1;
        }
        if (_cmd === 'showCorrectAnswerR42' && _data === 2) {
          _this.answerStatus = true;
          _this.currentQIndex = 2;
        }
        if (_cmd === 'showCorrectAnswerR42' && _data === 3) {
          _this.answerStatus = true;
          _this.currentQIndex = 3;
        }
        if (_cmd === 'showTableR42') {
          _this.showTable = !_this.showTable;
        }
        if (_cmd === 'hideAnswerR42') {
          _this.answerStatus = false;
        }
        if (_cmd === 'showAllAnswer') {
          _this.showAllAnswer = !_this.showAllAnswer;
        }
      });
    },
    computed: {
      groupedQuestions() {
        // Chia mảng thành các nhóm 2 phần tử
        const groupSize = 2;
        return this.questionDB.reduce((acc, question, index) => {
          if (index % groupSize === 0) acc.push([]);
          acc[acc.length - 1].push(question);
          return acc;
        }, []);
      },
    },
  });
</script>

</html>

<style>
  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
  }

  video#bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
    filter: blur(7px);
  }

  .questionWrapper {
    position: relative;
  }

  #roundTitleWrapper {
    position: absolute;
    width: 60vw;
    height: 60vh;
    top: 15vh;
    transition: all 1s ease-in-out;
    pointer-events: none;
    z-index: 2;
  }

  #roundTitleWrapper.shrunk {
    width: 60vw;
    height: 18vh;
    top: 1%;
    left: 20vw;
  }

  #roundTitle {
    width: 100%;
    height: 100%;
    background-image: url(../tiep-suc.png);
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center center;
    animation: floating 3s ease-in-out infinite;
  }

  @keyframes floating {
    0% {
      transform: translateY(0px);
    }

    50% {
      transform: translateY(-20px);
    }

    100% {
      transform: translateY(0px);
    }
  }

  #questionHolder {
    /* background-image: url(../tiep-suc.png); */
    background-size: contain;
    top: -18px;
    width: 100vw;
    height: 100vh;
    background-repeat: no-repeat;
    background-position: center center;
    margin: 19px -15px;
    position: relative;
    z-index: 3;
  }

  #questionHolder h1 {
    text-align: center;
    position: absolute;
    width: 100%;
    top: 2%;
    color: yellow;
  }

  #questionHolder h2 {
    text-align: center;
    position: absolute;
    width: 100%;
    top: 10%;
    color: yellow;
  }

  #questionHolder span {
    text-align: center;
    position: absolute;
    width: 80%;
    top: 28%;
    left: 10%;
    font-size: 26px;
    font-weight: bold;
    color: white;
    text-shadow: 1px 1px #333;
    padding: 15px;
  }

  div#counterAni {
    width: 245px;
    height: 245px;
    background: radial-gradient(#0dcaf06b, #681bff);
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translate(-50%, -50%);
    /* Dịch chuyển đối tượng đi ngược lại 50% của kích thước của nó */
    border-radius: 100%;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  div#outer {
    background: url(../outer_counter.png);
    width: 100%;
    height: 100%;
    background-size: contain;
    position: absolute;
    background-repeat: no-repeat;
    animation: rotateClockwise 10s ease-in-out infinite;
  }

  div#inner {
    background: url(../inner_counter.png);
    width: 100%;
    height: 100%;
    background-size: contain;
    position: absolute;
    background-repeat: no-repeat;
    animation: counterClockwise 5s ease-in-out infinite;
  }

  @keyframes rotateClockwise {
    0% {
      transform: rotate(0deg);
    }

    100% {
      transform: rotate(360deg);
    }
  }

  @keyframes counterClockwise {
    0% {
      transform: rotate(360deg);
    }

    50% {
      transform: rotate(0deg);
    }

    100% {
      transform: rotate(360deg);
    }
  }

  #counterText {
    margin-top: 25px;
    line-height: 140px;
    color: lime;
    font-size: 45px !important;
    text-shadow: 1px 5px 3px #333;
  }

  .ansPanel {
    background: url(../normal.png) no-repeat;
    background-size: contain;
    width: 50vw;
    height: 167px;
    margin: -30px 0 0 0;
    display: flex;
    position: relative;
    flex-direction: row;
    flex-wrap: nowrap;
    align-content: center;
    justify-content: center;
    align-items: center;
  }

  .ansPanel.correct {
    background-image: url(../correct.png);
  }

  .innerText {
    position: relative;
    width: 70%;
    text-align: center;
    font-weight: bold;
    font-size: 20px;
    margin: 0 auto;
  }

  .showTable {
    text-align: center;
    width: 100%;
    font-size: 30px !important;
    font-weight: bold;
    color: rgb(0, 0, 0) !important;
    background-image: linear-gradient(to right, #dbedf0, #dcd6ee);
    background-repeat: no-repeat;
    background-size: 100% 200%;
    border-radius: 20px;
    box-shadow: 0px 0 10px 2px #0fceff;
    opacity: 0;
    /* Bắt đầu với độ mờ 0 */
    animation: animate__bounceIn 3s forwards;
    /* Thêm animation */
  }

  .showCorrectAnswer {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    width: 100%;
    height: 560px;
    font-size: 30px !important;
    font-weight: bold;
    color: rgb(0, 0, 0) !important;
    background-image: linear-gradient(to right, #dbedf0, #dcd6ee);
    background-repeat: no-repeat;
    background-size: 100% 200%;
    border-radius: 20px;
    box-shadow: 0px 0 10px 2px #0fceff;
    opacity: 0;
    animation: animate__bounceIn 2s forwards;
  }

  .center-content {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100%;
  }

  @keyframes animate__bounceIn {
    0% {
      transform: scale(0.1) rotateY(180deg);
      /* Bắt đầu với tỷ lệ 0.1 và xoay 180 độ */
      opacity: 0;
    }

    50% {
      transform: scale(1.02) rotateY(0deg);
      /* Phóng to một chút và trở về vị trí */
    }

    100% {
      transform: scale(1);
      opacity: 1;
    }
  }

  @keyframes fadeIn {
    to {
      opacity: 1;
      /* Kết thúc với độ mờ 1 */
    }
  }

  .img-fade {
    opacity: 0;
    /* Bắt đầu với độ mờ 0 */
    animation: animate__flip 7s forwards;
    /* Thêm animation rollIn */
  }

  @keyframes animate__flip {
    0% {
      transform: rotateY(-90deg);
      /* Bắt đầu với góc quay -90 độ */
      opacity: 0;
      /* Độ mờ 0 */
    }

    100% {
      transform: rotateY(0deg);
      /* Quay về góc 0 độ */
      opacity: 1;
      /* Độ mờ 1 */
    }
  }
</style>
