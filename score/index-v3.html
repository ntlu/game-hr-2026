<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Score</title>
  <!-- <link rel="stylesheet" href="style.css" /> -->
  <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="./node_modules/animate.css/animate.min.css" />
  <script src="./vue-2.6.10.js"></script>
</head>

<body>
  <div id="app">
    <video id="bg" autoplay muted loop src="../bg-video-2.mp4"></video>
    <div class="table-wrapper" :class="{ 'is-congrats': congratulateTeam }" v-if="showTblStatus === true">
      <div class="cyber-table animate__animated animate__zoomInDown">
        <div class="cyber-header">
          <span class="teamName" style="color: #00f3ff; font-weight: 900; letter-spacing: 0px;">TÊN ĐỘI</span>
          <div class="divScore" style="color: #ff007f; font-weight: 900; letter-spacing: 0px;">
            <span class="itemsScore mt-1">ĐỒNG<br>ĐỘI ƠI!</span>
            <span class="itemsScore mt-1">LÀM CHỦ<br>TÌNH HUỐNG</span>
            <span class="itemsScore mt-1">TUYÊN<br>TRUYỀN</span>
            <span class="itemsScore" style="color: #ffdf00; font-size: 4.2vh">TỔNG</span>
          </div>
        </div>

        <transition-group name="list" tag="div" class="list-wrapper">
          <div v-for="item in items" :key="item.id" class="cyber-row" :class="{ 'is-gray': item.isGray }"
            :style="{backgroundColor: item.isGray ? 'rgba(255, 0, 0, 0.2)' : 'transparent'}">
            <span class="teamName" :style="{ color: item.isGray ? '#ff6b6b' : 'white' }">{{ 'Đội ' + item.id + ':\u00A0'
              + item.name }}</span>
            <div class="divScore" :style="{ color: item.isGray ? '#ff6b6b' : 'white' }">
              <span class="itemsScore score-r1">{{item.r1}}</span>
              <span class="itemsScore score-r21">{{item.r21}}</span>
              <span class="itemsScore score-r22">{{item.r22}}</span>
              <span class="itemsScore total-score">{{item.totalScore}}</span>
            </div>
          </div>
        </transition-group>
      </div>
    </div>

    <!-- <div class="congrats-text animate__animated animate__fadeInUp" v-if="congratulateTeam === true">
    XIN CHÚC MỪNG <br> 3 ĐỘI <br> VÀO VÒNG CHUNG KẾT!
  </div> -->
    <video class="congrats-video animate__animated animate__fadeIn" autoplay muted loop src="../le-trao-giao-2.mp4"
      v-if="congratulateTeam === true"></video>

    <div class="top-teams-overlay animate__animated animate__zoomIn" v-if="congratulateTeam === true">
      <div class="team-box top1">{{ items[0] ? items[0].name : '' }}</div>
      <div class="team-box top2">{{ items[1] ? items[1].name : '' }}</div>
      <div class="team-box top3">{{ items[2] ? items[2].name : '' }}</div>
    </div>
  </div>
</body>

<script>
  const initialItems = [
    { id: 1, name: 'VN 1', r1: 0, r21: 0, r22: 0, totalScore: 0, isGray: false },
    { id: 2, name: 'VN 2', r1: 0, r21: 0, r22: 0, totalScore: 0, isGray: false },
    { id: 3, name: 'VN 3', r1: 0, r21: 0, r22: 0, totalScore: 0, isGray: false },
  ];

  const vm = new Vue({
    el: '#app',
    data: () => ({
      items: [...initialItems], // Sao chép mảng ban đầu vào biến items
      sorting: false,

      showTblStatus: false,
      sortTeam: false,

      congratulateTeam: false,
    }),
    methods: {
      showTbl() {
        this.showTblStatus = !this.showTblStatus;
      },

      sortItems() {
        this.sorting = true;
        this.items.sort((a, b) => b.totalScore - a.totalScore);
        this.sorting = false;

        // Lấy 3 đội cao điểm nhất (bỏ đi các đội điểm thấp nhất từ vị trí thứ 3 trở đi)
        const lowestScoreTeams = this.items.slice(3);

        // Đánh dấu các đội này với màu xám
        for (const team of lowestScoreTeams) {
          team.isGray = true;
        }
      },

      deleteTeamsOut() {
        if (!this.isGray) {
          this.items = this.items.filter(team => !team.isGray);
        }
        this.congratulateTeam = true;
        this.showTblStatus = false;
      },

      resetItems() {
        // Khôi phục lại mảng items ban đầu
        this.items = [...initialItems];
        for (const team of this.items) {
          team.isGray = false;
        }
      },
    },
    created() {
      let _this = this;
      const channel = new BroadcastChannel('myChannel'); // Create a new broadcast channel
      channel.addEventListener('message', (event) => {
        console.log(event.data);
        let _cmd = event.data.message.cmd;
        //let _data = event.data.message.data;
        if (_cmd === 'showTbl') {
          _this.showTbl();
        }
        if (_cmd === 'showScore') {
          this.items = event.data.message.data;
        }
        if (_cmd === 'sort') {
          _this.sortItems();
        }
        if (_cmd === 'delete') {
          _this.deleteTeamsOut();
        }
        if (_cmd === 'reset') {
          _this.resetItems();
          _this.congratulateTeam = false;
        }
      });
    },
    watch: {},
    computed: {},
  });
</script>

</html>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

  #app {
    font-family: 'Montserrat', 'Segoe UI', sans-serif;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .table-wrapper {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    transform: translateY(-50%);
    transition: all 1.5s ease-in-out;
    z-index: 10;
  }

  .table-wrapper.is-congrats {
    top: 5%;
    transform: translateY(0);
  }

  .cyber-table {
    background: rgba(10, 15, 30, 0.85);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 2px solid rgba(0, 243, 255, 0.5);
    box-shadow: 0 0 30px rgba(0, 243, 255, 0.3), inset 0 0 20px rgba(0, 243, 255, 0.1);
    border-radius: 15px;
    padding: clamp(10px, 1.5vh, 25px) 20px;
    width: 86vw;
    position: relative;
  }

  .cyber-table::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(to bottom, transparent 50%, rgba(0, 243, 255, 0.03) 51%);
    background-size: 100% 6px;
    pointer-events: none;
    z-index: 1;
    border-radius: inherit;
  }

  .cyber-header {
    display: flex;
    /* === ĐỘ DÀY VIỀN DƯỚI VÀ KHOẢNG CÁCH CỦA TIÊU ĐỀ === */
    padding-bottom: clamp(5px, 1vh, 15px);
    border-bottom: 2px solid rgba(0, 243, 255, 0.5);
    margin-bottom: clamp(5px, 1.5vh, 15px);
    position: relative;
    z-index: 2;
  }

  .list-wrapper {
    display: flex;
    flex-direction: column;
    width: 100%;
    position: relative;
    z-index: 2;
  }

  .cyber-row {
    display: flex;
    align-items: center;
    /* === KÍCH THƯỚC VÀ KHOẢNG CÁCH CỦA MỖI HÀNG (ĐỘ MỎNG) === */
    padding: clamp(2px, 0.7vh, 8px) 10px;
    /* Tự động co giãn theo chiều cao màn hình */
    border-bottom: 1px dotted rgba(255, 255, 255, 0.15);
    transition: all 2.5s ease-in-out;
    border-radius: 5px;
    margin-bottom: clamp(1px, 1.4vh, 10px);
    /* Tự động co giãn khoảng cách */
  }

  .cyber-row.is-gray {
    filter: grayscale(1) opacity(1);
    pointer-events: none;
  }

  .is-congrats .cyber-row {
    padding: clamp(1px, 0.4vh, 6px) 10px !important;
  }

  .is-congrats .teamName {
    font-size: clamp(12px, 2.2vh, 32px);
  }

  .is-congrats .itemsScore {
    font-size: clamp(14px, 2.6vh, 24px);
  }

  .is-congrats .cyber-header .itemsScore {
    font-size: clamp(12px, 2vh, 20px);
  }

  .is-congrats .cyber-table {
    padding: clamp(5px, 0.8vh, 15px) 20px;
  }

  .is-congrats .cyber-header {
    padding-bottom: clamp(3px, 0.6vh, 10px);
    margin-bottom: clamp(3px, 0.8vh, 10px);
  }

  .list-move {
    transition: transform 1.5s ease-in-out;
  }

  .cyber-row:hover {
    background: rgba(0, 243, 255, 0.15) !important;
  }

  .teamName {
    width: 38%;
    flex-shrink: 0;
    /* === CỠ CHỮ TÊN ĐỘI === */
    font-size: clamp(3vh, 3.2vh, 3.5vh);
    font-weight: 700;
  }

  .divScore {
    display: flex;
    flex: 1;
    justify-content: space-around;
    gap: 1.5vw;
  }

  .itemsScore {
    flex: 1;
    min-width: 0;
    text-align: center;
    /* === CỠ CHỮ ĐIỂM SỐ === */
    font-size: clamp(3vh, 4vh, 4vh);
    font-weight: 700;
    line-height: 1.1;
  }

  .cyber-header .itemsScore {
    font-size: clamp(16px, 2.2vh, 24px);
    font-weight: 900;
  }

  .score-r1,
  .score-r21,
  .score-r22,
  .total-score {
    border-radius: 5px;
    border: 1px solid rgba(255, 255, 255, 0.5);
    padding: 2px 10px;
    color: #fff;
  }

  .score-r1 {
    background: linear-gradient(90deg, #0052d4);
    box-shadow: 0 0 10px rgba(67, 100, 247, 0.5);
    padding: 2px 10px;
  }

  .score-r21 {
    background: linear-gradient(90deg, #0052d4);
    box-shadow: 0 0 10px rgba(56, 239, 125, 0.5);
    padding: 2px 10px;
  }

  .score-r22 {
    background: linear-gradient(90deg, #0052d4);
    box-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
  }

  .total-score {
    background: linear-gradient(165deg, #ffdf00, #ffe7e7);
    box-shadow: 0 0 15px rgba(255, 223, 0, 0.6);
    color: #ff0000;
    /* Chữ màu đen để nổi bật trên nền vàng trắng */
  }

  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
  }

  video#bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
  }

  video#bg.blur {
    filter: blur(3px);
  }

  .congrats-video {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: 0;
    transform: translate(-50%, -50%);
  }

  .top-teams-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 999;
    pointer-events: none;
  }

  .team-box {
    background: rgba(10, 20, 50, 0.9);
    border-radius: 10px;
    font-size: clamp(30px, 3vw, 60px);
    font-weight: 900;
    letter-spacing: 2px;
    position: absolute;
    transform: translate(-50%, -50%);
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 15px;
    word-break: break-word;
    line-height: 1.2;
  }

  .team-box.top1 {
    color: #ffda6a;
    /* Vàng */
    border: 3px solid #ffda6a;
    box-shadow: 0 0 20px rgba(255, 218, 106, 0.5), inset 0 0 10px rgba(255, 218, 106, 0.2);
    top: 35%;
    left: 50%;
    /* Tùy chỉnh kích thước Top 1 */
    /* font-size: clamp(35px, 3vw, 80px); */
    font-size: 40px;
    width: 25vw;
    height: auto;
  }

  .team-box.top2 {
    color: #c0c0c0;
    /* Bạc */
    border: 3px solid #c0c0c0;
    box-shadow: 0 0 20px rgba(192, 192, 192, 0.5), inset 0 0 10px rgba(192, 192, 192, 0.2);
    top: 45%;
    left: 15%;
    /* Tùy chỉnh kích thước Top 2 */
    font-size: 30px;
    width: 18vw;
    height: auto;
  }

  .team-box.top3 {
    color: #cd7f32;
    /* Đồng */
    border: 3px solid #cd7f32;
    box-shadow: 0 0 20px rgba(205, 127, 50, 0.5), inset 0 0 10px rgba(205, 127, 50, 0.2);
    top: 46%;
    left: 85%;
    /* Tùy chỉnh kích thước Top 3 */
    font-size: 30px;
    width: 18vw;
    height: auto;
  }

  @media (min-width: 1200px) {
    .team-box.top1 {
      width: 20vw;
      font-size: 50px;
    }

    .team-box.top2 {
      width: 14vw;
      font-size: 35px;
      left: 24%;
    }

    .team-box.top3 {
      width: 14vw;
      font-size: 35px;
      left: 76%;
    }
  }

  .congrats-text {
    position: absolute;
    z-index: 999;
    left: 50%;
    bottom: 8vh;
    transform: translateX(-50%);
    font-size: clamp(24px, 4.5vw, 48px);
    font-weight: 900;
    color: #fff;
    text-align: center;
    background: rgba(10, 15, 30, 0.95);
    padding: 20px 60px;
    border: 3px solid #00f3ff;
    border-radius: 20px;
    box-shadow: 0 0 50px rgba(0, 243, 255, 0.6), inset 0 0 20px rgba(0, 243, 255, 0.3);

    letter-spacing: 4px;
    animation: neonPulse 1.5s infinite alternate;
    white-space: nowrap;
    clip-path: polygon(5% 0, 95% 0, 100% 20%, 100% 80%, 95% 100%, 5% 100%, 0 80%, 0 20%);
    line-height: 1.3;
  }

  @keyframes neonPulse {
    0% {
      box-shadow: 0 0 30px rgba(0, 243, 255, 0.4), inset 0 0 10px rgba(0, 243, 255, 0.2);
      text-shadow: 0 0 10px #ff007f;
      transform: translateX(-50%) scale(1);
    }

    100% {
      box-shadow: 0 0 80px rgba(0, 243, 255, 1), inset 0 0 40px rgba(0, 243, 255, 0.8);
      text-shadow: 0 0 20px #ff007f, 0 0 40px #ff007f;
      transform: translateX(-50%) scale(1.05);
    }
  }
</style>
