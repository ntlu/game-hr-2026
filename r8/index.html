<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>R8 Tuyên truyền</title>
  <link rel="stylesheet" href="styleR7.css" />
  <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="./node_modules/animate.css/animate.min.css" />
  <script src="./vue-2.6.10.js"></script>
</head>

<body>
  <div id="app">
    <audio class="d-none" loop src="audioSrc" id="audio" ref="bgm"></audio>
    <audio class="d-none" :src="sfxSrc" id="audio" ref="sfx"></audio>
    <div class="container-fluid">
      <video id="bg" autoplay muted loop src="../bg-video-2.mp4"></video>
      <div class="row">
        <div class="col-12 questionWrapper animate__animated animate__fadeIn">
          <div id="questionHolder">
            <div class="content">
              <div style="width: 100vw;">
                <div>
                  <img style="animation: zoomInOut 3s alternate infinite; top: 25px; left: -10px; width: 82%;"
                    v-if="showTeam1" src="./static/r7-rp.png" alt="doi1">
                  <img style="animation: zoomInOut 3s alternate infinite; top: 25px; left: -10px; width: 82%;"
                    v-if="showTeam2" src="./static/r7-e1+poth.png" alt="doi2">
                  <img style="animation: zoomInOut 3s alternate infinite; top: 25px; left: -10px; width: 82%;"
                    v-if="showTeam3" src="./static/r7-VPL.png" alt="doi3">
                </div>

                <div style="width: 99vw; margin-top: 20px;">
                  <img src="./static/r7-rp.png" alt="doi2" :class="{ 'd-none': showTeam1 || showTeam2 || showTeam3 }">

                  <img src="./static/r7-e1+poth.png" alt="doi1"
                    :class="{ 'd-none': showTeam1 || showTeam2 || showTeam3 }">


                  <img src="./static/r7-kvp.png" alt="doi3" :class="{ 'd-none': showTeam1 || showTeam2 || showTeam3 }">

                </div>
              </div>
            </div>
            <div v-show="counterStatus" id="counterAni" class="animate__animated animate__rollIn">
              <div id="outer"></div>
              <div id="inner"></div>
              <h1 id="counterText" :style="{ color: counterColor, fontSize: counterFontSize }" ref="counterText"
                v-html="counterText"></h1>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
<script src="./r7.js"></script>
<script>

  const vm = new Vue({
    el: '#app',
    data: () => ({

      tickerInterval: null,
      counterText: '00:00',
      counterColor: 'lime',
      counterFontSize: '23px',
      counterTime: 0,
      audioSrc: '../BGM-2.mp3',
      sfxSrc: '../end.mp3',
      questionDB: qDB,
      currentQIndex: 0,
      answerStatus: false,
      counterStatus: false,

      showTeam1: false,
      showTeam2: false,
      showTeam3: false,

      intervalId: null,
    }),
    methods: {
      playBGM(fileName) {
        this.audioSrc = fileName;
        this.$refs['bgm'].src = this.audioSrc;
        this.$refs['bgm'].play();
      },
      playSFX(fileName) {
        this.sfxSrc = fileName;
        this.$refs['sfx'].src = this.sfxSrc;
        this.$refs['sfx'].play();
      },
      stopBGM() {
        this.$refs['bgm'].pause();
        this.$refs['bgm'].currentTime = 0;
      },
      startCounting(seconds) {
        // Ngừng setInterval cũ (nếu có)
        if (this.intervalId !== null) {
          clearInterval(this.intervalId);
          this.intervalId = null;
        }
        this.counterStatus = true;

        // this.playBGM(this.audioSrc);

        this.counterTime = seconds;
        // Cập nhật hiển thị ban đầu
        this.updateCounterDisplay();
        // Bắt đầu lần đếm mới
        this.intervalId = setInterval(() => {
          this.counterTime--;

          if (this.counterTime <= 0) {
            // Ngừng và đặt lại biến intervalId
            clearInterval(this.intervalId);
            this.intervalId = null;
            this.counterStatus = false;
            this.stopBGM();
            this.playSFX('../end.mp3');
          } else {
            this.updateCounterDisplay();
          }
        }, 1000);
      },
      updateCounterDisplay() {
        if (this.counterTime > 60) {
          this.counterFontSize = '23px';
          this.counterColor = 'lime';

          // Tính toán phút và giây còn lại
          const minutes = Math.floor(this.counterTime / 60);
          let remainingSeconds = this.counterTime % 60;
          if (remainingSeconds < 10) {
            remainingSeconds = `0${remainingSeconds}`;
          }
          this.counterText = `${minutes}:${remainingSeconds}`;
        } else {
          this.counterFontSize = '38px';
          if (this.counterTime < 10) {
            this.counterColor = 'red';
          }
          this.counterText = `${this.counterTime}`;
        }
      },
      receiveMessage(event) {

        console.log(event.data);
      },
    },
    created() {
      let _this = this;
      const channel = new BroadcastChannel('myChannel'); // Create a new broadcast channel
      channel.addEventListener('message', (event) => {
        console.log(event.data);
        let _cmd = event.data.message.cmd;
        let _data = event.data.message.data;

        if (_cmd === 'chooseTeam' && _data === 1) {
          _this.showTeam1 = true;
          _this.showTeam2 = false;
          _this.showTeam3 = false;
        }
        if (_cmd === 'chooseTeam' && _data === 2) {
          _this.showTeam2 = true;
          _this.showTeam1 = false;
          _this.showTeam3 = false;
        }
        if (_cmd === 'chooseTeam' && _data === 3) {
          _this.showTeam3 = true;
          _this.showTeam1 = false;
          _this.showTeam2 = false;
        }
        if (_cmd === 'showAll') {
          _this.showTeam1 = false;
          _this.showTeam2 = false;
          _this.showTeam3 = false;
        }

        if (_cmd === 'startCountingR7') {
          _this.startCounting(_data);
        }
      });
    },
  });
</script>

</html>
<style>
  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
  }

  video#bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
    filter: blur(7px);
  }

  .questionWrapper {
    position: relative;
  }

  #questionHolder img {
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center center;
    position: relative;
  }

  #questionHolder {
    background-image: url(../tuyentruyen.png);
    background-size: contain;
    top: -20px;
    width: 100vw;
    height: 100vh;
    background-repeat: no-repeat;
    background-position: center center;
    margin: 19px -12px;
    position: relative;
  }

  #questionHolder h1 {
    text-align: center;
    position: absolute;
    width: 100%;
    top: 2%;
    color: yellow;
  }

  #questionHolder h2 {
    text-align: center;
    position: absolute;
    width: 100%;
    top: 10%;
    color: yellow;
  }

  #questionHolder p {
    font-size: 35px;
    color: orange;
    width: 50%;
    height: 100px;
    background-color: white;
    border-radius: 70px 0 100px 0;
    margin-bottom: -2px;
    margin-left: 50%;
  }

  #questionHolder h3 {
    color: white;
    font-weight: bold;
    font-family: arial;
    width: 100%;
    height: 100%;
    background-color: orange;
    border-radius: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-transform: uppercase;
  }

  #questionHolder .content {
    text-align: center;
    position: absolute;
    width: 100%;
    top: 10%;
    color: yellow;
  }

  #questionHolder span {
    text-align: center;
    position: absolute;
    width: 80%;
    top: 36%;
    left: 10%;
    font-size: 26px;
    font-weight: bold;
    color: white;
    text-shadow: 1px 1px #333;
  }

  div#counterAni {
    width: 180px;
    height: 180px;
    background: radial-gradient(#0dcaf06b, #681bff);
    position: absolute;
    top: 55%;
    left: 42%;
    border-radius: 100%;
    text-align: center;
  }

  div#outer {

    background: url(../outer_counter.png);
    width: 200%;
    height: 200%;
    top: -50% !important;
    left: -50% !important;
    background-size: contain;
    position: absolute;
    background-repeat: no-repeat;
    animation: rotateClockwise 10s ease-in-out infinite;
  }

  div#inner {
    background: url(../inner_counter.png);
    width: 200%;
    height: 200%;
    top: -50% !important;
    left: -50% !important;
    background-size: contain;
    position: absolute;
    background-repeat: no-repeat;
    animation: counterClockwise 5s ease-in-out infinite;
  }

  @keyframes rotateClockwise {
    0% {
      transform: rotate(0deg);
    }

    100% {
      transform: rotate(360deg);
    }
  }

  @keyframes counterClockwise {
    0% {
      transform: rotate(360deg);
    }

    50% {
      transform: rotate(0deg);
    }

    100% {
      transform: rotate(360deg);
    }
  }

  #counterText {
    font-size: 60px !important;
    margin-top: 15px;
    line-height: 140px;
    color: lime;
    text-shadow: 1px 5px 3px #333;
  }

  .ansPanel {
    background: url(../normal.png) no-repeat;
    background-size: contain;
    width: 50vw;
    height: 167px;
    margin: -30px 0 0 0;
    display: flex;
    position: relative;
    flex-direction: row;
    flex-wrap: nowrap;
    align-content: center;
    justify-content: center;
    align-items: center;
  }

  .ansPanel.correct {
    background-image: url(../correct.png);
  }

  .innerText {
    position: relative;
    width: 70%;
    text-align: center;
    font-weight: bold;
    font-size: 20px;
    margin: 0 auto;
  }

  @keyframes zoomInOut {
    0% {
      transform: scale(1);
    }

    50% {
      transform: scale(1.1);
    }

    100% {
      transform: scale(1);
    }
  }
</style>
