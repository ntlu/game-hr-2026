<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Dynamic Puzzle</title>
    <script src="./vue-2.6.10.js"></script>
    <style>
        body {
            margin: 0;
            background: #111;
            overflow: hidden;
        }

        svg {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        .puzzle-piece {
            transition: all 0.3s ease;
        }

        .puzzle-piece:hover {
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <div id="app">
        <svg viewBox="0 0 1920 1080">
            <!-- Checkerboard background for visual effect -->
            <defs>
                <pattern id="checker" width="40" height="40" patternUnits="userSpaceOnUse">
                    <rect width="20" height="20" fill="#333" />
                    <rect x="20" y="20" width="20" height="20" fill="#333" />
                    <rect x="20" width="20" height="20" fill="#555" />
                    <rect y="20" width="20" height="20" fill="#555" />
                </pattern>
            </defs>
            <rect width="1920" height="1080" fill="url(#checker)" />

            <!-- Draw pieces -->
            <path v-for="(p, i) in pieces" :key="i" :d="p.d" :fill="p.color" stroke="white" stroke-width="3"
                class="puzzle-piece" />

            <!-- Numbering for pieces -->
            <text v-for="(p, i) in pieces" :key="'t'+i" :x="p.cx" :y="p.cy" fill="white" font-size="40"
                font-weight="bold" text-anchor="middle" alignment-baseline="middle" style="pointer-events: none;">
                {{ i + 1 }}
            </text>
        </svg>
    </div>

    <script>
        const COLS = 5;
        const ROWS = 4;
        const W = 384;
        const H = 270;
        const TAB = 40;

        const colors = [
            '#e57373', '#81c784', '#64b5f6', '#fff176', '#ba68c8',
            '#4dd0e1', '#ffb74d', '#9575cd', '#4db6ac', '#a1887f',
            '#f06292', '#aed581', '#7986cb', '#ffd54f', '#4fc3f7',
            '#90a4ae', '#ff8a65', '#4dd0e1', '#dce775', '#ffb74d'
        ];

        function randomTab() {
            return Math.random() > 0.5 ? 1 : -1;
        }

        function buildEdge(x1, y1, x2, y2, type) {
            if (type === 0) {
                return `L ${x2} ${y2}`;
            }
            const dx = x2 - x1;
            const dy = y2 - y1;
            const len = Math.hypot(dx, dy);
            const u = dx / len;
            const v = dy / len;

            const mx = (x1 + x2) / 2;
            const my = (y1 + y2) / 2;

            const sx = mx - TAB * u;
            const sy = my - TAB * v;

            const ex = mx + TAB * u;
            const ey = my + TAB * v;

            const sweep = type === 1 ? 1 : 0;

            return `L ${sx} ${sy} A ${TAB} ${TAB} 0 0 ${sweep} ${ex} ${ey} L ${x2} ${y2}`;
        }

        function buildPiece(x, y, left, right, top, bottom) {
            const pTop = buildEdge(x, y, x + W, y, top);
            const pRight = buildEdge(x + W, y, x + W, y + H, right);
            const pBottom = buildEdge(x + W, y + H, x, y + H, bottom);
            const pLeft = buildEdge(x, y + H, x, y, left);

            return `M ${x} ${y} ${pTop} ${pRight} ${pBottom} ${pLeft} Z`;
        }

        new Vue({
            el: '#app',
            data: {
                pieces: []
            },
            created() {
                const connections = [];
                for (let r = 0; r < ROWS; r++) {
                    const rowArr = [];
                    for (let c = 0; c < COLS; c++) {
                        rowArr.push({ right: 0, bottom: 0 });
                    }
                    connections.push(rowArr);
                }

                const piecesData = [];
                for (let row = 0; row < ROWS; row++) {
                    for (let col = 0; col < COLS; col++) {

                        const left = col === 0 ? 0 : connections[row][col - 1].right * -1;
                        const right = col === COLS - 1 ? 0 : randomTab();
                        const top = row === 0 ? 0 : connections[row - 1][col].bottom * -1;
                        const bottom = row === ROWS - 1 ? 0 : randomTab();

                        connections[row][col].right = right;
                        connections[row][col].bottom = bottom;

                        const d = buildPiece(col * W, row * H, left, right, top, bottom);

                        piecesData.push({
                            d: d,
                            color: colors[(row * COLS + col) % colors.length] || '#ccc',
                            cx: col * W + W / 2,
                            cy: row * H + H / 2
                        });
                    }
                }

                this.pieces = piecesData;
            }
        });
    </script>
</body>

</html>
